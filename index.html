<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryan's Portfolio | AI Server PM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="i18n_dict.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 1.5rem; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .tab-inactive { border-bottom: 4px solid transparent; color: #6b7280; }
        .dark .tab-inactive { color: #9ca3af; }
        .tab-inactive:hover { color: #374151; border-bottom: 4px solid #d1d5db; }
        .dark .tab-inactive:hover { color: #f3f4f6; border-bottom: 4px solid #4b5563; }

        @media print {
            body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .card { break-inside: avoid; border: 1px solid #d1d5db !important; box-shadow: none !important; margin-bottom: 1rem; }
            .lg\:grid-cols-3 { display: flex !important; flex-direction: column !important; }
            .lg\:col-span-2, .col-span-1 { width: 100% !important; max-width: 100% !important; }
        }
    </style>
</head>
<body class="p-6 bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <div class="max-w-7xl mx-auto">
        
        <div class="mb-6 border-b border-gray-300 dark:border-gray-700">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end pb-2 gap-4">
                <div class="flex space-x-6 md:space-x-8">
                    <button id="btn-tab-tco" onclick="switchTab('tco')" class="tab-active pb-3 text-base md:text-lg transition-colors duration-200">
                        📊 <span id="t-tab-tco">AI 伺服器 TCO 評估儀表板</span>
                    </button>
                    <button id="btn-tab-mindset" onclick="switchTab('mindset')" class="tab-inactive pb-3 text-base md:text-lg transition-colors duration-200">
                        🧠 <span id="t-tab-mindset">產品企劃：專案管理思維對照</span>
                    </button>
                </div>
                <div class="flex items-center space-x-3 mb-2">
                    <div class="text-sm font-bold bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200 px-3 py-1.5 rounded-full shadow-sm">
                        <span id="t-author">製作者：莊仕祺 (Bryan)</span>
                    </div>
                    <button onclick="toggleLanguage()" class="print:hidden bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white px-3 py-1.5 rounded shadow hover:bg-gray-300 dark:hover:bg-gray-600 transition text-sm font-bold flex items-center">
                        🌐 <span id="langBtnText" class="ml-1">EN</span>
                    </button>
                    <button onclick="window.print()" class="print:hidden bg-gray-800 dark:bg-gray-600 text-white px-4 py-1.5 rounded shadow hover:bg-gray-900 dark:hover:bg-gray-500 transition text-sm font-bold">
                        📄 <span id="t-export">匯出 PDF</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="wrapper-tco" class="block">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                </div>
        </div>

        <div id="wrapper-mindset" class="hidden">
            </div>
    </div>

    <button id="themeToggleBtn" onclick="toggleTheme()" class="print:hidden fixed bottom-4 right-4 bg-gray-800 dark:bg-yellow-400 text-white dark:text-gray-900 p-2 md:p-3 rounded-full shadow-md hover:scale-110 transition-transform flex items-center justify-center z-50">
        <span id="themeIcon" class="text-base">☀️</span>
    </button>

    <script>
        // UI 工具函式
        function updateInputFromSlider() { document.getElementById('rackValInput').value = document.getElementById('serversPerRack').value; }
        function updateSliderFromInput() {
            let val = parseInt(document.getElementById('rackValInput').value);
            if(isNaN(val) || val < 10) val = 10;
            if(val > 72) val = 72;
            document.getElementById('rackValInput').value = val; document.getElementById('serversPerRack').value = val;
        }
        function formatYearsInput(el) { let val = parseFloat(el.value); if(isNaN(val) || val < 1) val = 1; el.value = val.toFixed(1); }
        function formatUtilInput(el) { let val = parseInt(el.value); if(isNaN(val) || val < 1) val = 1; if(val > 100) val = 100; el.value = val; }

        // 🚀 關鍵改動 2：管理語系狀態
        let currentLang = 'zh';

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('langBtnText').innerText = currentLang === 'zh' ? 'EN' : '中文';
            
            // 此處的 dict 將自動從引用的 i18n_dict.js 讀取
            for (const key in dict[currentLang]) {
                const element = document.getElementById(key);
                if (element) { element.innerHTML = dict[currentLang][key]; }
            }
            calculateTCO(); // 重新計算以更新圖表中的語系標籤
        }

        // 其餘邏輯 (toggleTheme, switchTab, calculateTCO, drawChart) 維持不變
        // ... (將原本的 calculateTCO 與 drawChart 完整貼回此處)

        function toggleTheme() {
            const htmlElement = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark'); themeIcon.innerText = '🌙'; 
            } else {
                htmlElement.classList.add('dark'); themeIcon.innerText = '☀️'; 
            }
            calculateTCO();
        }

        function switchTab(tabName) {
            const btnTco = document.getElementById('btn-tab-tco');
            const btnMindset = document.getElementById('btn-tab-mindset');
            const wrapperTco = document.getElementById('wrapper-tco');
            const wrapperMindset = document.getElementById('wrapper-mindset');
            if (tabName === 'tco') {
                btnTco.className = 'tab-active pb-3 text-base md:text-lg transition-colors duration-200';
                btnMindset.className = 'tab-inactive pb-3 text-base md:text-lg transition-colors duration-200';
                wrapperTco.className = 'block'; wrapperMindset.className = 'hidden';
            } else {
                btnMindset.className = 'tab-active pb-3 text-base md:text-lg transition-colors duration-200';
                btnTco.className = 'tab-inactive pb-3 text-base md:text-lg transition-colors duration-200';
                wrapperMindset.className = 'block'; wrapperTco.className = 'hidden';
            }
        }

        let tcoChartInstance = null;
        // ... (其餘 calculateTCO 與 drawChart 代碼)
        // 建議此處維持你原本那版完整的計算邏輯

        window.onload = calculateTCO;
    </script>
</body>
</html>
